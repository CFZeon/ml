experiment:
  name: btc_trend_breakout_futures
  description: Futures trend-strength and breakout example.
data:
  market: um_futures
  symbol: BTCUSDT
  interval: 1h
  start: 2024-01-01
  end: 2024-04-01
  context_symbols: [ETHUSDT]
indicators:
  - kind: rsi
    params:
      period: 14
  - kind: macd
  - kind: atr
    params:
      period: 14
  - kind: adx
    params:
      period: 14
  - kind: donchian
    params:
      window: 20
features:
  lags: [1, 2, 3]
  frac_diff_d: 0.4
  rolling_window: 16
  context_timeframes: [4h]
feature_selection:
  max_features: 56
  min_mi_threshold: 0.0
regime:
  enabled: false
labels:
  kind: fixed_horizon
  horizon: 3
  threshold: 0.0
  cost_rate: 0.0
model:
  type: logistic
  cv_method: walk_forward
  n_splits: 4
  train_size: 360
  test_size: 96
  gap: 3
signals:
  policy_mode: theory_only
  avg_win: 0.012
  avg_loss: 0.008
  threshold: 0.0
  edge_threshold: 0.0
  fraction: 0.75
  min_trades_for_kelly: 10
  meta_threshold: 0.0
  profitability_threshold: 0.0
  expected_edge_threshold: 0.0
  sizing_mode: expected_utility
  tuning_min_trades: 1
backtest:
  engine: pandas
  apply_funding: true
  allow_short: true
  leverage: 2.0
  signal_delay_bars: 1
  futures_account:
    enabled: true
    margin_mode: isolated
    warning_margin_ratio: 0.8
    leverage_brackets_data:
      symbol: BTCUSDT
      brackets:
        - bracket: 1
          initial_leverage: 20.0
          notional_floor: 0.0
          notional_cap: 50000.0
          maint_margin_ratio: 0.02
          cum: 0.0
quick_overrides:
  data:
    end: 2024-02-20
