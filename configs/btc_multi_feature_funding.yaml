experiment:
  name: btc_multi_feature_funding
  description: Futures experiment with technical features plus funding-rate context.
data:
  source: binance_bars
  market: um_futures
  symbol: BTCUSDT
  interval: 1h
  start: 2024-01-01
  end: 2024-04-15
  context_symbols: [ETHUSDT, SOLUSDT]
indicators:
  - kind: returns
    params:
      periods: [1, 3, 6]
  - kind: volatility
    params:
      window: 24
  - kind: rsi
    params:
      period: 14
  - kind: macd
  - kind: funding_rate
    params:
      rolling_window: 9
      max_age: 8h
      min_coverage: 0.6
model:
  type: logistic
  cv_method: cpcv
backtest:
  engine: pandas
  allow_short: true
  apply_funding: true
quick_overrides:
  data:
    end: 2024-02-20
