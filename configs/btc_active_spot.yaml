experiment:
  name: btc_active_spot
  description: Active-trading spot demo with walk-forward validation.
data:
  market: spot
  symbol: BTCUSDT
  interval: 1h
  start: 2024-01-01
  end: 2024-06-01
  context_symbols: [ETHUSDT, SOLUSDT, BNBUSDT]
indicators:
  - kind: rsi
    params:
      period: 14
  - kind: macd
  - kind: bollinger
    params:
      period: 20
  - kind: atr
    params:
      period: 14
model:
  cv_method: walk_forward
  n_splits: 3
  train_size: 720
  test_size: 168
  gap: 6
signals:
  threshold: 0.0
  edge_threshold: 0.0
  fraction: 0.75
  meta_threshold: 0.5
  profitability_threshold: 0.5
  expected_edge_threshold: 0.0
  sizing_mode: expected_utility
backtest:
  signal_delay_bars: 1
quick_overrides:
  data:
    end: 2024-03-15
