experiment:
  name: btc_regime_aware
  description: Regime-aware spot model using a simple custom range-position indicator.
data:
  source: binance_bars
  market: spot
  symbol: BTCUSDT
  interval: 1h
  start: 2024-01-01
  end: 2024-05-01
  context_symbols: [ETHUSDT, SOLUSDT]
indicators:
  - kind: returns
    params:
      periods: [1, 3, 6]
  - kind: volatility
    params:
      window: 24
  - kind: rsi
    params:
      period: 14
  - kind: range_position
    params:
      window: 20
regime:
  method: hmm
model:
  type: gbm
  cv_method: cpcv
  regime_aware:
    enabled: true
    strategy: specialist
    min_samples_per_regime: 60
backtest:
  engine: vectorbt
quick_overrides:
  data:
    end: 2024-03-01
